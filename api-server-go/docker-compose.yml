version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mochat-api
    ports:
      - "9501:9501"
    environment:
      - GIN_MODE=release
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=mochat123
      - DB_NAME=mochat
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - mochat-net

  mysql:
    image: mysql:8.0
    container_name: mochat-mysql
    environment:
      MYSQL_ROOT_PASSWORD: mochat123
      MYSQL_DATABASE: mochat
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmochat123"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mochat-net

  redis:
    image: redis:7-alpine
    container_name: mochat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - mochat-net

volumes:
  mysql-data:
  redis-data:

networks:
  mochat-net:
    driver: bridge
